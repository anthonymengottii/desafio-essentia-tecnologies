services:
  mysql:
    image: mysql:8
    container_name: techx-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: techx
      MYSQL_USER: techx
      MYSQL_PASSWORD: techxpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: techx-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: techx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://root:rootpass@mysql:3306/techx"
      MONGO_URL: "mongodb://mongo:27017/techx"
      JWT_SECRET: "troque-este-segredo-em-producao"
      JWT_EXPIRES_IN: "7d"
      PORT: "3333"
      CORS_ORIGIN: "http://localhost:4200"
    ports:
      - "3333:3333"
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started

  adminer:
    image: adminer
    container_name: techx-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
  mongo_data:
