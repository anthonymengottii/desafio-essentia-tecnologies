<div class="auth-wrap">
  <form class="card auth-card" (ngSubmit)="submit()">
    <h2>Criar conta</h2>
    <p class="auth-subtitle">Organize suas tarefas do dia a dia.</p>

    <div class="field">
      <label for="name">Nome</label>
      <input
        id="name"
        type="text"
        name="name"
        [(ngModel)]="name"
        [class.invalid]="errorsFor('name').length"
        autocomplete="name"
        placeholder="Seu nome completo"
      />
      @for (msg of errorsFor('name'); track msg) {
        <span class="field-error">{{ msg }}</span>
      }
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        [class.invalid]="errorsFor('email').length"
        autocomplete="email"
        placeholder="seu@email.com"
      />
      @for (msg of errorsFor('email'); track msg) {
        <span class="field-error">{{ msg }}</span>
      }
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="password-wrap">
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          name="password"
          [(ngModel)]="password"
          [class.invalid]="errorsFor('password').length"
          autocomplete="new-password"
          minlength="6"
          placeholder="Mínimo 6 caracteres"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="showPassword.set(!showPassword())"
          [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
        >
          {{ showPassword() ? '🙈' : '👁' }}
        </button>
      </div>
      @for (msg of errorsFor('password'); track msg) {
        <span class="field-error">{{ msg }}</span>
      }
    </div>

    <button class="btn" type="submit" [disabled]="loading()">
      {{ loading() ? 'Cadastrando...' : 'Cadastrar' }}
    </button>

    @if (error()) {
      <p class="error-msg">{{ error() }}</p>
    }

    <p class="auth-switch">Já tem conta? <a routerLink="/login">Entrar</a></p>
  </form>
</div>
