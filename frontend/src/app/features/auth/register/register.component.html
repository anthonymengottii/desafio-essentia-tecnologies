<div class="auth-wrap">
  <form class="card auth-card" (ngSubmit)="submit()">
    <h2>Criar conta</h2>

    <div class="field">
      <label for="name">Nome</label>
      <input id="name" type="text" name="name" [(ngModel)]="name" required />
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input id="email" type="email" name="email" [(ngModel)]="email" required />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        minlength="6"
      />
    </div>

    <button class="btn" type="submit" [disabled]="loading()">
      {{ loading() ? 'Cadastrando...' : 'Cadastrar' }}
    </button>

    @if (error()) {
      <p class="error-msg">{{ error() }}</p>
    }

    <p class="auth-switch">Já tem conta? <a routerLink="/login">Entrar</a></p>
  </form>
</div>
