@if (auth.isLoggedIn()) {
  <div class="shell" [class.collapsed]="collapsed()" [class.mobile-open]="mobileOpen()">
    <!-- Sidebar fixa -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <strong>TechX</strong>
          <small>Gerenciador de tarefas</small>
        </div>
        <button
          class="icon-btn"
          (click)="toggleSidebar()"
          [title]="collapsed() ? 'Expandir' : 'Minimizar'"
          [attr.aria-label]="collapsed() ? 'Expandir menu' : 'Minimizar menu'"
        >
          <lucide-icon [img]="collapsed() ? ExpandIcon : CollapseIcon" [size]="18" />
        </button>
      </div>

      <nav class="nav">
        <span class="nav-label">Navegação</span>
        <a routerLink="/tasks" routerLinkActive="active" class="nav-item" title="Lista">
          <lucide-icon [img]="ListIcon" [size]="18" />
          <span>Lista</span>
        </a>
        <a routerLink="/kanban" routerLinkActive="active" class="nav-item" title="Kanban">
          <lucide-icon [img]="KanbanIcon" [size]="18" />
          <span>Kanban</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <div class="user-info">
          <span class="avatar">{{ initials() }}</span>
          <span class="user-name">{{ auth.user()?.name }}</span>
        </div>
        <button class="logout-btn" (click)="logout()" title="Sair" aria-label="Sair">
          <lucide-icon [img]="LogOutIcon" [size]="16" />
          <span>Sair</span>
        </button>
      </div>
    </aside>

    <!-- Overlay do drawer (mobile) -->
    <div class="sidebar-overlay" (click)="closeMobile()"></div>

    <!-- Topbar fixa -->
    <header class="topbar">
      <button
        class="icon-btn menu-btn"
        (click)="toggleMobile()"
        aria-label="Abrir menu"
        title="Menu"
      >
        <lucide-icon [img]="MenuIcon" [size]="20" />
      </button>
      <h2 class="page-title">{{ pageTitle() }}</h2>
    </header>

    <!-- Conteúdo -->
    <main class="content">
      <div class="content-inner">
        <router-outlet />
      </div>
    </main>
  </div>
} @else {
  <main class="content-auth">
    <router-outlet />
  </main>
}

<app-toast />
