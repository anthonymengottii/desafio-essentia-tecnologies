@if (auth.isLoggedIn()) {
  <header class="topbar">
    <a routerLink="/tasks" class="brand">
      <span class="brand-text">
        <strong>TechX</strong>
        <small>Gerenciador de tarefas</small>
      </span>
    </a>

    <div class="user-area">
      <div class="user-info">
        <span class="avatar">{{ initials() }}</span>
        <span class="user-name">{{ auth.user()?.name }}</span>
      </div>
      <button class="btn-ghost" (click)="logout()">
        <lucide-icon [img]="LogOutIcon" [size]="16" />
        <span>Sair</span>
      </button>
    </div>
  </header>
}

<main class="content">
  <router-outlet />
</main>
